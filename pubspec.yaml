name: ecommerce_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.3.4

dependencies:
  cached_network_image:
  carousel_slider_plus:
  flutter:
    sdk: flutter
  flutter_screenutil:
  flutter_slidable:
  auto_size_text:
  colornames:
  flutter_svg:
  shared_preferences: ^2.5.5
  flutter_native_splash:
  readmore:
  smooth_page_indicator:
  page_transition: ^2.2.1
  # add injectable to your dependencies
  injectable:
  # add get_it
  get_it:
  retrofit: ^4.9.0
  logger: ^2.6.0  # for logging purpose
  json_annotation: ^4.9.0
  connectivity_plus: ^7.1.1
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  injectable_generator:
  build_runner:
  retrofit_generator: ^10.0.1
  json_serializable: ^6.10.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg_images/



  fonts:
     - family: Poppins
       fonts:
         - asset: assets/fonts/Poppins-.ttf



